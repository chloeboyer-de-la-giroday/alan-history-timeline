<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan \u2014 Year Timelines</title>
<style>
:root {
  --purple:       #5C59F3;
  --purple-600:   #4744E0;
  --purple-mid:   #B4B3FA;
  --purple-soft:  #D9D8FD;
  --purple-light: #ECECFE;
  --cream:        #FAF6EE;
  --ink:          #17171F;
  --ink-mid:      #45454F;
  --ink-light:    #6E6E78;
  --ink-faint:    #9A9AA4;
  --border:       #E6E6EB;
  --surface:      #FFFFFF;
  --font: 'Alan Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --shadow-sm:  0 1px 4px rgba(23,23,31,0.07), 0 1px 2px rgba(23,23,31,0.04);
  --shadow-md:  0 4px 20px rgba(23,23,31,0.09), 0 1px 4px rgba(23,23,31,0.04);
  --shadow-hover: 0 6px 20px rgba(92,89,243,0.18);
  --shadow-purple: 0 6px 18px rgba(92,89,243,0.28);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #EDEDF0; color: var(--ink); min-height: 100vh; }

/* \u2500\u2500 NAV \u2500\u2500 */
.nav {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 13px 32px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 3px rgba(23,23,31,0.06);
}
.nav-brand { font-weight: 800; font-size: 15px; letter-spacing: -0.02em; }
.nav-brand span { color: var(--purple); }
.nav-divider { width: 1px; height: 18px; background: var(--border); }
.nav-label { font-size: 12.5px; font-weight: 500; color: var(--ink-faint); }
.year-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
.year-btn {
  font-family: var(--font); font-weight: 600; font-size: 12.5px;
  border: 1.5px solid var(--border); background: white; color: var(--ink-mid);
  padding: 5px 13px; border-radius: 999px; cursor: pointer;
  transition: all 0.13s ease-out; letter-spacing: -0.01em;
}
.year-btn:hover { border-color: var(--purple-mid); color: var(--purple); background: var(--purple-light); }
.year-btn.active { background: var(--purple); border-color: var(--purple); color: white; box-shadow: var(--shadow-purple); }
.nav-notion-hint { margin-left: auto; font-size: 11.5px; color: var(--ink-faint); font-weight: 500; }

/* \u2500\u2500 STAGE \u2500\u2500 */
.stage { padding: 28px 24px; display: flex; align-items: flex-start; justify-content: center; }

/* \u2500\u2500 YEAR CARD \u2500\u2500 */
.year-card {
  background: var(--cream);
  border-radius: 22px;
  width: 100%; max-width: 1360px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}

/* \u2500\u2500 HEADER \u2500\u2500 */
.year-hdr {
  padding: 28px 52px 22px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
  border-bottom: 1px solid rgba(230,230,235,0.75);
}
.year-eyebrow {
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--purple); margin-bottom: 7px;
}
.year-number {
  font-size: 58px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--ink); line-height: 1; margin-bottom: 9px;
}
.year-tagline {
  font-size: 17px; font-weight: 500; color: var(--ink-light);
  line-height: 1.45; max-width: 640px;
}
.card-top { position: relative; }
.marmot-wrap {
  position: absolute; top: 28px; right: 52px; bottom: 0;
  width: 280px;
}
.marmot-wrap.era-a { width: 185px; }
.marmot-img {
  position: absolute; bottom: 0; right: 0;
  max-width: 100%; max-height: 100%; width: auto; height: auto;
  display: block;
}

/* \u2500\u2500 METRICS \u2500\u2500 */
.metrics-eoy-note {
  padding: 0 26px 10px 52px; font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.03em; color: var(--ink-faint);
}
.metrics-row { display: flex; border-bottom: 1px solid rgba(230,230,235,0.75); }
.metric { flex: 1; padding: 13px 26px; border-right: 1px solid rgba(230,230,235,0.75); }
.metric:first-child { padding-left: 52px; }
.metric:last-child { border-right: none; }
.metric-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px;
}
.metric-value { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); }

/* \u2500\u2500 TIMELINE \u2500\u2500 */
.timeline-wrap { padding: 38px 60px 28px; }
#timeline-area { position: relative; width: 100%; height: 320px; }

/* Track */
.tl-track {
  position: absolute; left: 0; right: 28px; height: 3px;
  border-radius: 999px; background: var(--purple-soft); top: 160px;
}
.tl-arrow {
  position: absolute; right: -13px; top: -6px;
  width: 0; height: 0;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
  border-left: 13px solid var(--purple-soft);
}

/* Dot */
.ev-dot {
  position: absolute; border-radius: 50%;
  transform: translate(-50%, -50%); top: 160px;
  transition: transform 0.15s; z-index: 4;
  pointer-events: none;
}
.ev-dot.star {
  width: 13px; height: 13px;
  background: var(--purple); border: 2.5px solid white;
  box-shadow: 0 0 0 2.5px rgba(92,89,243,0.28);
}
.ev-dot.minor {
  width: 9px; height: 9px;
  background: white; border: 2px solid var(--purple-mid);
}

/* Connector */
.ev-conn {
  position: absolute; width: 1.5px;
  background: var(--purple-soft); transform: translateX(-50%);
  z-index: 2; pointer-events: none;
}

/* Card */
.ev-card {
  position: absolute; max-width: 152px; width: 152px;
  background: white; border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 11px;
  transform: translateX(-50%);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.14s, box-shadow 0.14s, transform 0.14s;
  z-index: 5; text-align: left;
  text-decoration: none; display: block;
}
.ev-card.clickable { cursor: pointer; }
.ev-card.star { border-color: rgba(92,89,243,0.2); }
.ev-card.clickable:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--purple-mid);
  transform: translateX(-50%) translateY(-2px);
}

.ev-icon { font-size: 13px; line-height: 1; margin-bottom: 4px; }
.ev-label {
  font-size: 11.5px; font-weight: 700; color: var(--ink);
  line-height: 1.3; word-wrap: break-word;
}
.ev-card.minor .ev-label { font-weight: 600; color: var(--ink-mid); font-size: 11px; }
.ev-desc {
  font-size: 9.5px; font-weight: 400;
  color: var(--ink-light); margin-top: 3px; line-height: 1.35;
}
.ev-note {
  font-size: 9px; font-weight: 500;
  color: var(--ink-faint); margin-top: 4px; line-height: 1.3;
  border-top: 1px solid var(--border); padding-top: 3px;
}
.ev-notion-tag {
  display: none; margin-top: 5px;
  font-size: 9.5px; font-weight: 600; color: var(--purple);
  letter-spacing: 0.02em;
}
.ev-card.clickable:hover .ev-notion-tag { display: block; }

/* \u2500\u2500 CORNER MARMOT \u2500\u2500 */
.marmot-corner-wrap {
  position: absolute; bottom: 0; left: 24px;
  display: flex; flex-direction: column; align-items: flex-start;
  pointer-events: none;
  z-index: 1;
}
.marmot-corner {
  width: 150px; height: 150px;
  object-fit: contain;
  opacity: 0.85;
  display: block;
}
.mascot-caption {
  margin-top: 5px; font-size: 9.5px; font-weight: 600;
  color: var(--ink-faint); letter-spacing: 0.02em; white-space: nowrap;
}
</style>
</head>

// \u2500\u2500 RENDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderYear(yr) {
  const data = YEARS[yr];
  const card = document.getElementById('year-card');

  const eraKey = eraForYear(Number(yr));
  const era = MARMOTS[eraKey];

  card.innerHTML = `
    <div class="card-top">
      <div class="year-hdr">
        <div class="year-hdr-left">
          <div class="year-eyebrow">Alan \u00B7 Our History</div>
          <div class="year-number">${yr}</div>
          <div class="year-tagline">${data.tagline}</div>
        </div>
      </div>
      <div class="metrics-eoy-note">End-of-year (EOY) figures${String(yr) === '2016' ? '' : ' \u00B7 growth vs. prior year-end'}</div>
      <div class="metrics-row" id="metrics-row"></div>
      <div class="marmot-wrap era-${eraKey}">
        <img class="marmot-img" src="${era.big}" alt="Alan marmot" />
      </div>
    </div>
    <div class="timeline-wrap" style="position:relative;">
      <div id="timeline-area"></div>
      <div class="marmot-corner-wrap">
        <img class="marmot-corner" src="${era.small}" alt="" />
        <div class="mascot-caption">${era.caption}</div>
      </div>
    </div>
  `;

  // Metrics
  const mRow = document.getElementById('metrics-row');
  data.metrics.forEach(m => {
    const d = document.createElement('div');
    d.className = 'metric';
    d.innerHTML = `<div class="metric-label">${m.label}</div><div class="metric-value">${m.value}</div>`;
    mRow.appendChild(d);
  });

  // Timeline \u2014 wait for layout
  requestAnimationFrame(() => {
    const area = document.getElementById('timeline-area');
    const W = area.offsetWidth;

    // Track
    const track = document.createElement('div');
    track.className = 'tl-track';
    track.innerHTML = '<div class="tl-arrow"></div>';
    area.appendChild(track);

    const events = data.events;
    const N = events.length;

    events.forEach((ev, i) => {
      const pct = N === 1 ? 0.5 : i / (N - 1);
      const x = PAD + pct * (W - PAD * 2);
      const above = i % 2 === 0;
      const isStar = ev.star;
      const dotR = isStar ? 6.5 : 4.5;

      // Determine notion URL and label for this event
      const evNotion = ev.ev_notion;
      const notionUrl = evNotion ? evNotion[0] : data.notion;
      const notionLabel = evNotion ? `open ${evNotion[1]}` : `open ${data.notionYearLabel}`;

      // Dot
      const dot = document.createElement('div');
      dot.className = `ev-dot ${isStar ? 'star' : 'minor'}`;
      dot.style.left = x + 'px';
      area.appendChild(dot);

      // Connector
      const conn = document.createElement('div');
      conn.className = 'ev-conn';
      conn.style.left = x + 'px';
      if (above) {
        conn.style.top = (TY - dotR - CONN_H) + 'px';
        conn.style.height = CONN_H + 'px';
      } else {
        conn.style.top = (TY + dotR) + 'px';
        conn.style.height = CONN_H + 'px';
      }
      area.appendChild(conn);

      // Card
      const cardEl = document.createElement('div');
      cardEl.className = `ev-card clickable ${isStar ? 'star' : 'minor'}`;
      cardEl.style.left = x + 'px';

      if (above) {
        const cardBottomY = TY - dotR - CONN_H;
        cardEl.style.bottom = (AREA_H - cardBottomY) + 'px';
      } else {
        cardEl.style.top = (TY + dotR + CONN_H) + 'px';
      }

      cardEl.innerHTML = `
        <div class="ev-icon">${ev.icon}</div>
        <div class="ev-label">${ev.label}</div>
        ${ev.desc ? `<div class="ev-desc">${ev.desc}</div>` : ''}
        ${ev.note ? `<div class="ev-note">${ev.note}</div>` : ''}
        <div class="ev-notion-tag">${notionLabel} \u2192</div>
      `;

      cardEl.title = notionLabel;
      cardEl.addEventListener('click', () => window.open(notionUrl, '_blank'));

      // Hover effect on dot
      cardEl.addEventListener('mouseenter', () => dot.style.transform = 'translate(-50%,-50%) scale(1.3)');
      cardEl.addEventListener('mouseleave', () => dot.style.transform = 'translate(-50%,-50%) scale(1)');

      area.appendChild(cardEl);
    });
  });
}

// \u2500\u2500 YEAR BUTTONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const btnContainer = document.getElementById('year-buttons');
let first = true;
Object.keys(YEARS).forEach(yr => {
  const btn = document.createElement('button');
  btn.className = 'year-btn' + (first ? ' active' : '');
  btn.textContent = yr;
  btn.dataset.year = yr;
  btn.addEventListener('click', function () {
    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderYear(parseInt(this.dataset.year));
  });
  btnContainer.appendChild(btn);
  first = false;
});

renderYear(2016);
</script>
